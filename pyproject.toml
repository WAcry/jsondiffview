[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jsondiffview"
version = "1.0.0"
description = "Terminal-first JSON diff viewer with strict parsing and deterministic matching."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "David Zhang", email = "davidzhang2000@outlook.com" }]
keywords = ["json", "diff", "cli", "terminal", "yaml"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Testing",
    "Topic :: Utilities",
]
dependencies = ["PyYAML>=6.0"]

[project.urls]
Homepage = "https://github.com/WAcry/jsondiffview"
Repository = "https://github.com/WAcry/jsondiffview"
Issues = "https://github.com/WAcry/jsondiffview/issues"
Changelog = "https://github.com/WAcry/jsondiffview/releases"

[project.scripts]
jsondiffview = "jsondiffview:main"

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = [
    "jsondiffview",
    "jsondiffview_cli",
    "jsondiffview_diff_engine",
    "jsondiffview_errors",
    "jsondiffview_loader",
    "jsondiffview_match_rules",
    "jsondiffview_matcher",
    "jsondiffview_path_syntax",
    "jsondiffview_testing",
    "jsondiffview_text_diff",
    "jsondiffview_types",
]
packages = ["jsondiffview_renderers"]
