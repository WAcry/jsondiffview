name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run test suite
        run: uv run pytest -q

      - name: Smoke test module and CLI entrypoints
        shell: bash
        run: |
          uv run python - <<'PY'
          import re
          import subprocess
          import sys
          from importlib.metadata import version
          from pathlib import Path

          def strip_ansi(text: str) -> str:
              return re.sub(r"\x1b\[[0-?]*[ -/]*[@-~]", "", text)

          Path("left.json").write_text('{"value":1}', encoding="utf-8")
          Path("right.json").write_text('{"value":2}', encoding="utf-8")
          package_version = version("jsondiffview")

          module_help = subprocess.run(
              [sys.executable, "-m", "jdv", "--help"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          cli_help = subprocess.run(
              ["jdv", "--help"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          cli_version = subprocess.run(
              ["jdv", "--version"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          diff_result = subprocess.run(
              ["jdv", "left.json", "right.json", "--color", "never"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )

          assert module_help.returncode == 0, module_help
          assert cli_help.returncode == 0, cli_help
          assert cli_version.returncode == 0, cli_version
          assert diff_result.returncode == 0, diff_result
          assert "--view" in strip_ansi(module_help.stdout), module_help.stdout
          assert "--view" in strip_ansi(cli_help.stdout), cli_help.stdout
          assert cli_version.stdout == f"jdv {package_version}\n", cli_version.stdout
          assert '~ "value": 1 -> 2' in diff_result.stdout, diff_result.stdout
          PY
