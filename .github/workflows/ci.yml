name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run test suite
        run: uv run pytest -q

      - name: Smoke test module and CLI entrypoints
        shell: bash
        run: |
          cat > left.json <<'JSON'
          {"value":1}
          JSON
          cat > right.json <<'JSON'
          {"value":2}
          JSON

          uv run python -m jdv --help > module-help.txt
          uv run jdv --help > cli-help.txt
          uv run jdv --version > version.txt
          uv run jdv left.json right.json --color never > diff.txt

          grep -F -- "--view" module-help.txt
          grep -F -- "--view" cli-help.txt
          grep -E '^jdv [0-9]+\.[0-9]+\.[0-9]+$' version.txt
          grep -F '~ "value": 1 -> 2' diff.txt
