name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: uv build --no-sources

      - name: Validate package metadata
        run: uvx twine check dist/*

      - name: Smoke test built wheel
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install dist/jsondiffview-*.whl
          python - <<'PY'
          from pathlib import Path
          import subprocess

          Path("left.json").write_text('{"word":"english"}', encoding="utf-8")
          Path("right.json").write_text('{"word":"inglés"}', encoding="utf-8")

          help_result = subprocess.run(
              ["jsondiffview", "--help"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          assert help_result.returncode == 0, help_result
          assert "usage: jsondiffview" in help_result.stdout, help_result.stdout

          version_result = subprocess.run(
              ["jsondiffview", "--version"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          assert version_result.returncode == 0, version_result
          assert "jsondiffview " in version_result.stdout, version_result.stdout

          diff_result = subprocess.run(
              [
                  "jsondiffview",
                  "left.json",
                  "right.json",
                  "--view",
                  "changed",
                  "--color",
                  "never",
              ],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          assert diff_result.returncode == 1, diff_result.returncode
          assert "word (replace)" in diff_result.stdout, diff_result.stdout
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke-test-testpypi:
    name: Smoke test TestPyPI package
    runs-on: ubuntu-latest
    needs: publish-testpypi
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait for TestPyPI package availability
        run: |
          python -m venv .venv-testpypi
          . .venv-testpypi/bin/activate
          for attempt in $(seq 1 10); do
            if python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple jsondiffview==${GITHUB_REF_NAME#v}; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Verify installed CLI
        run: |
          . .venv-testpypi/bin/activate
          jsondiffview --help
          jsondiffview --version

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: smoke-test-testpypi
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Derive release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: jsondiffview ${{ steps.version.outputs.value }}
          files: dist/*
          generate_release_notes: true
