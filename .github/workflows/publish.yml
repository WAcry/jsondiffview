name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run test suite
        run: uv run pytest -q

      - name: Build distributions
        run: uv build --no-sources

      - name: Validate package metadata
        run: uvx twine check dist/*

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install dist/jsondiffview-*.whl

          cat > left.json <<'JSON'
          {"value":1}
          JSON
          cat > right.json <<'JSON'
          {"value":2}
          JSON

          jdv --help > cli-help.txt
          jdv --version > version.txt
          python -m jdv --help > module-help.txt
          jdv left.json right.json --color never > diff.txt

          grep -F -- "--view" cli-help.txt
          grep -F -- "--view" module-help.txt
          grep -E '^jdv [0-9]+\.[0-9]+\.[0-9]+$' version.txt
          grep -F '~ "value": 1 -> 2' diff.txt

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke-test-testpypi:
    name: Smoke test TestPyPI package
    runs-on: ubuntu-latest
    needs: publish-testpypi
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait for TestPyPI package availability
        shell: bash
        run: |
          python -m venv .venv-testpypi
          . .venv-testpypi/bin/activate
          for attempt in $(seq 1 10); do
            if python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple jsondiffview==${GITHUB_REF_NAME#v}; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Verify installed CLI
        shell: bash
        run: |
          . .venv-testpypi/bin/activate
          jdv --help
          jdv --version
          python -m jdv --help

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: smoke-test-testpypi
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Derive release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: jsondiffview ${{ steps.version.outputs.value }}
          files: dist/*
          generate_release_notes: true
