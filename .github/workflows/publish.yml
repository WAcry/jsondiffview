name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run test suite
        run: uv run pytest -q

      - name: Build distributions
        run: uv build --no-sources

      - name: Validate package metadata
        run: uvx twine check dist/*

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install dist/jsondiffview-*.whl

          python - <<'PY'
          import subprocess
          import sys
          from importlib.metadata import version
          from pathlib import Path

          Path("left.json").write_text('{"value":1}', encoding="utf-8")
          Path("right.json").write_text('{"value":2}', encoding="utf-8")
          package_version = version("jsondiffview")

          cli_help = subprocess.run(
              ["jdv", "--help"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          cli_version = subprocess.run(
              ["jdv", "--version"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          module_help = subprocess.run(
              [sys.executable, "-m", "jdv", "--help"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          diff_result = subprocess.run(
              ["jdv", "left.json", "right.json", "--color", "never"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )

          assert cli_help.returncode == 0, cli_help
          assert cli_version.returncode == 0, cli_version
          assert module_help.returncode == 0, module_help
          assert diff_result.returncode == 0, diff_result
          assert "--view" in cli_help.stdout, cli_help.stdout
          assert "--view" in module_help.stdout, module_help.stdout
          assert cli_version.stdout == f"jdv {package_version}\n", cli_version.stdout
          assert '~ "value": 1 -> 2' in diff_result.stdout, diff_result.stdout
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke-test-testpypi:
    name: Smoke test TestPyPI package
    runs-on: ubuntu-latest
    needs: publish-testpypi
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait for TestPyPI package availability
        shell: bash
        run: |
          python -m venv .venv-testpypi
          . .venv-testpypi/bin/activate
          for attempt in $(seq 1 10); do
            if python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple jsondiffview==${GITHUB_REF_NAME#v}; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Verify installed CLI
        shell: bash
        run: |
          . .venv-testpypi/bin/activate
          python - <<'PY'
          import os
          import subprocess
          import sys
          from importlib.metadata import version

          package_version = version("jsondiffview")
          expected_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")

          cli_help = subprocess.run(
              ["jdv", "--help"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          cli_version = subprocess.run(
              ["jdv", "--version"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )
          module_help = subprocess.run(
              [sys.executable, "-m", "jdv", "--help"],
              capture_output=True,
              text=True,
              encoding="utf-8",
              check=False,
          )

          assert package_version == expected_version, (package_version, expected_version)
          assert cli_help.returncode == 0, cli_help
          assert cli_version.returncode == 0, cli_version
          assert module_help.returncode == 0, module_help
          assert "--view" in cli_help.stdout, cli_help.stdout
          assert "--view" in module_help.stdout, module_help.stdout
          assert cli_version.stdout == f"jdv {package_version}\n", cli_version.stdout
          PY

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: smoke-test-testpypi
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Derive release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: jsondiffview ${{ steps.version.outputs.value }}
          files: dist/*
          generate_release_notes: true
